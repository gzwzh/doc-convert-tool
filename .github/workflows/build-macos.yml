name: Build macOS Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install root dependencies
        run: npm install

      - name: Build frontend
        run: npm run build:frontend

      - name: Install backend Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r backend/requirements.txt
          python3 -m pip install pyinstaller

      - name: Build backend executable
        run: python3 -m PyInstaller --noconfirm --clean --name backend-server --distpath backend/dist --workpath backend/build backend/main.py

      - name: Verify backend output
        run: ls -R backend/dist

      - name: Build macOS package
        env:
          DEBUG: electron-builder
        run: |
          node -e "const fs = require('fs'); const pkg = require('./package.json'); fs.mkdirSync('release/' + pkg.version + '/mac', { recursive: true })"
          npx electron-builder --mac dir

      - name: Archive macOS app bundle
        run: |
          VERSION=$(node -p "require('./package.json').version")
          APP_PATH=$(find release -type d -name "*.app" | head -n 1)
          test -n "$APP_PATH"
          ZIP_PATH="release/${VERSION}/mac/doc-convert-tool-mac.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"
          echo "Created $ZIP_PATH"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            release/*/mac/*.zip
          if-no-files-found: error
