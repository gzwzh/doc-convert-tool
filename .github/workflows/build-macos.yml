name: Build macOS Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install root dependencies
        run: npm install

      - name: Build frontend
        run: npm run build:frontend

      - name: Install backend Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r backend/requirements.txt
          python3 -m pip install pyinstaller

      - name: Build backend executable
        run: python3 -m PyInstaller --noconfirm --clean --name backend-server --distpath backend/dist --workpath backend/build backend/main.py

      - name: Verify backend output
        run: ls -R backend/dist

      - name: Prepare macOS icon
        run: |
          rm -rf build/icons/app.iconset build/icons/app.icns
          mkdir -p build/icons/app.iconset
          sips -z 16 16 build/icons/512x512.png --out build/icons/app.iconset/icon_16x16.png
          sips -z 32 32 build/icons/512x512.png --out build/icons/app.iconset/icon_16x16@2x.png
          sips -z 32 32 build/icons/512x512.png --out build/icons/app.iconset/icon_32x32.png
          sips -z 64 64 build/icons/512x512.png --out build/icons/app.iconset/icon_32x32@2x.png
          sips -z 128 128 build/icons/512x512.png --out build/icons/app.iconset/icon_128x128.png
          sips -z 256 256 build/icons/512x512.png --out build/icons/app.iconset/icon_128x128@2x.png
          sips -z 256 256 build/icons/512x512.png --out build/icons/app.iconset/icon_256x256.png
          sips -z 512 512 build/icons/512x512.png --out build/icons/app.iconset/icon_256x256@2x.png
          cp build/icons/512x512.png build/icons/app.iconset/icon_512x512.png
          cp build/icons/512x512.png build/icons/app.iconset/icon_512x512@2x.png
          iconutil -c icns build/icons/app.iconset -o build/icons/app.icns

      - name: Build macOS package
        env:
          DEBUG: electron-builder
        run: |
          node -e "const fs = require('fs'); const pkg = require('./package.json'); fs.mkdirSync('release/' + pkg.version + '/mac', { recursive: true })"
          npx electron-builder --mac zip

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            release/*/mac/*.zip
          if-no-files-found: error
