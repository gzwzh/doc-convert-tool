appId: com.converttool.app
productName: 文档转换器
directories:
  output: release/${version}
  buildResources: build
extraResources:
  - from: backend/dist
    to: backend/dist
files:
  - from: .
    filter:
      - package.json
      - electron/**/*
  - from: frontend/dist
    to: frontend/dist
    filter:
      - "**/*"
win:
  icon: frontend/public/app.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  unicode: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: 文档转换器
  allowElevation: true
  runAfterFinish: false
  include: build/installer.nsh
  artifactName: installer/${productName}-Setup-${version}.${ext}
portable:
  artifactName: portable/${productName}-Portable-${version}.${ext}
